<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="0.55" stop-color="#0066ff"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="w" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <!-- Dark-mode-aware glow -->
    <style>
      @media (prefers-color-scheme: dark) {
        #ringGlow { stroke: #ffffff; stroke-opacity: 0.25; }
      }
      .pulse-dot {
        transform-origin: 52px 18px;
        transform-box: fill-box;
        animation: pulse 2.4s ease-in-out infinite;
      }
      .pulse-ring {
        transform-origin: 52px 18px;
        transform-box: fill-box;
        animation: ring 2.4s ease-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1;   transform: scale(1); }
        50%      { opacity: 0.8; transform: scale(1.15); }
      }
      @keyframes ring {
        0%   { opacity: 0.6; transform: scale(1); }
        100% { opacity: 0;   transform: scale(2.4); }
      }
    </style>
  </defs>

  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Soft outline ring (dark-mode aware via CSS) -->
  <rect id="ringGlow" x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" ry="13.25"
        fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.2"/>

  <!-- W mark -->
  <path d="M12 18 L20 46 L32 26 L44 46 L52 18"
        stroke="url(#w)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Pulsing accent dot + ring -->
  <circle class="pulse-ring" cx="52" cy="18" r="4.4" fill="#34d399"/>
  <circle class="pulse-dot"  cx="52" cy="18" r="4.4" fill="#34d399"/>
</svg>
