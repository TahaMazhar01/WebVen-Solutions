<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0066ff" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta -->
    <title>Webven — Modern Web, Mobile & SEO Studio</title>
    <meta name="description" content="Webven is a premium digital studio crafting modern websites, mobile apps and SEO strategies that move people. Trusted by 40+ brands including ASHGroup Dubai." />
    <meta name="keywords" content="web design, web development, mobile app development, SEO, UI/UX design, React, Next.js, digital studio, Dubai, Pakistan, freelance" />
    <meta name="author" content="Webven Studio" />
    <link rel="canonical" href="https://webven.studio/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webven.studio/" />
    <meta property="og:title" content="Webven — Modern Web, Mobile & SEO Studio" />
    <meta property="og:description" content="Premium digital studio crafting modern websites, mobile apps and SEO strategies that move people." />
    <meta property="og:image" content="https://webven.studio/og-image.jpg" />
    <meta property="og:site_name" content="Webven Studio" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://webven.studio/" />
    <meta name="twitter:title" content="Webven — Modern Web, Mobile & SEO Studio" />
    <meta name="twitter:description" content="Premium digital studio crafting modern websites, mobile apps and SEO strategies." />
    <meta name="twitter:image" content="https://webven.studio/og-image.jpg" />

    <!-- Apple touch -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-title" content="Webven" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Performance: preconnects + fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://prod.spline.design" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- JSON-LD structured data for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Webven Studio",
        "url": "https://webven.studio",
        "logo": "https://webven.studio/favicon.svg",
        "description": "Premium digital studio crafting modern websites, mobile apps and SEO strategies.",
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
